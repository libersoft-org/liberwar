<!doctype html>
<html lang="en">
	<head>
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<title></title>
		<style>
			:root {
				--yellow: #fd3;
				--bg: #000;
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background-color: var(--bg);
				color: var(--yellow);
				font-family: 'Ubuntu', sans-serif;
				user-select: none;
				-webkit-user-select: none;
			}

			#app {
				width: 100vw;
				height: 100vh;
				position: relative;
				overflow: hidden;
			}

			#game {
				display: block;
				width: 100%;
				height: 100%;
			}

			.splash {
				position: fixed;
				inset: 0;
				z-index: 1000;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 28px;
				background: var(--bg);
				transition: opacity 0.45s ease;
			}

			.splash .title {
				font-weight: bold;
				font-size: 5vh;
			}

			.splash .bar {
				width: 50vw;
				height: 2vh;
				border: 0.1vh solid var(--yellow);
				border-radius: 1vh;
			}

			.splash .bar .fill {
				width: 4%;
				height: 100%;
				background: var(--yellow);
				border-radius: 6px;
				transition: width 0.25s ease;
			}

			.splash .status {
				font-size: 16px;
				font-weight: bold;
				color: var(--yellow);
			}
		</style>
	</head>
	<body>
		<div id="app">
			<canvas id="game"></canvas>
		</div>
		<div class="splash">
			<div class="title"></div>
			<div class="bar">
				<div class="fill"></div>
			</div>
			<div class="status"></div>
		</div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
