<!doctype html>
<html lang="en">
	<head>
		<!-- Ubuntu font from Google Fonts -->
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<title></title>
		<style>
			:root {
				--hud-bg: #0c120c;
				--hud-panel: #16221a;
				--hud-border: #2f4a36;
				--accent: #6cff7a;
				--accent-dim: #2c7a36;
				--danger: #ff5a4d;
				--text: #cfe9d2;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #000;
				color: var(--text);
				font-family: 'Ubuntu', sans-serif;
				user-select: none;
				-webkit-user-select: none;
			}
			#app {
				width: 100vw;
				height: 100vh;
				position: relative;
			}
			canvas#game {
				display: block;
				width: 100%;
				height: 100%;
				cursor: crosshair;
				image-rendering: pixelated;
			}

			/* Start menu overlay */
			#menu {
				position: absolute;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 18px;
				background: radial-gradient(circle at 50% 30%, #16321a 0%, #060a06 70%);
				z-index: 50;
			}
			#menu h1 {
				font-size: 56px;
				letter-spacing: 4px;
				color: var(--accent);
				text-shadow: 0 0 18px rgba(108, 255, 122, 0.6);
				font-weight: 800;
			}
			#menu .title {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 2px;
			}
			#menu .version {
				font-size: 20px;
				letter-spacing: 2px;
				opacity: 0.55;
				font-weight: bold;
			}
			#menu .buildinfo {
				font-size: 14px;
				letter-spacing: 1px;
				opacity: 0.5;
				margin-top: 6px;
				text-align: center;
				line-height: 1.4;
			}
			#menu p {
				max-width: 540px;
				text-align: center;
				opacity: 0.85;
				line-height: 1.5;
			}
			.btn {
				background: var(--hud-panel);
				border: 1px solid var(--hud-border);
				color: var(--text);
				padding: 12px 28px;
				font-size: 18px;
				border-radius: 6px;
				cursor: pointer;
				transition: all 0.12s ease;
			}
			.btn:hover {
				background: var(--accent-dim);
				border-color: var(--accent);
				color: #fff;
			}
			.difficulty {
				display: flex;
				gap: 10px;
			}
			.difficulty .btn.active {
				background: var(--accent-dim);
				border-color: var(--accent);
			}
			.lang {
				display: flex;
				gap: 8px;
				align-items: center;
			}
			.lang .btn {
				padding: 6px 14px;
				font-size: 14px;
			}
			.lang .btn.active {
				background: var(--accent-dim);
				border-color: var(--accent);
			}

			#endScreen {
				position: absolute;
				inset: 0;
				display: none;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 20px;
				background: rgba(0, 0, 0, 0.8);
				z-index: 60;
			}
			#endScreen h1 {
				font-size: 64px;
				letter-spacing: 6px;
			}
			#endScreen.win h1 {
				color: var(--accent);
				text-shadow: 0 0 24px rgba(108, 255, 122, 0.7);
			}
			#endScreen.lose h1 {
				color: var(--danger);
				text-shadow: 0 0 24px rgba(255, 90, 77, 0.7);
			}

			#pauseScreen {
				position: absolute;
				inset: 0;
				display: none;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 20px;
				background: rgba(0, 0, 0, 0.72);
				z-index: 60;
			}
			#pauseScreen .dialog {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 18px;
				padding: 36px 48px;
				background: var(--hud-panel);
				border: 1px solid var(--hud-border);
				border-radius: 10px;
				box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
			}
			#pauseScreen h2 {
				font-size: 30px;
				letter-spacing: 4px;
				color: var(--accent);
			}
			#pauseScreen .actions {
				display: flex;
				flex-direction: column;
				gap: 12px;
				width: 240px;
			}
			#pauseScreen .actions .btn {
				text-align: center;
			}

			#credits {
				font-size: 20px;
				font-weight: bold;
				opacity: 0.5;
			}
			#credits a {
				color: var(--accent);
				text-decoration: none;
			}
			#credits a:hover {
				text-decoration: underline;
			}

			#links {
				display: flex;
				gap: 20px;
				justify-content: center;
				margin-top: 10px;
			}
			#links a {
				color: var(--accent);
				text-decoration: none;
				font-weight: bold;
			}
			#links a:hover {
				text-decoration: underline;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<canvas id="game"></canvas>

			<div id="menu">
				<div class="title">
					<h1 id="appTitle"></h1>
					<div class="version" id="appVersion"></div>
					<div class="buildinfo" id="buildInfo"></div>
					<div id="credits"></div>
					<div id="links">
						<a id="websiteLink" target="_blank" rel="noopener noreferrer" data-lang="menu.website"></a>
						<a id="githubLink" target="_blank" rel="noopener noreferrer" data-lang="menu.github"></a>
					</div>
				</div>
				<p data-lang="menu.intro"></p>
				<div class="difficulty" id="difficulty">
					<div class="btn" data-diff="easy" data-lang="menu.difficulty.easy"></div>
					<div class="btn active" data-diff="medium" data-lang="menu.difficulty.medium"></div>
					<div class="btn" data-diff="hard" data-lang="menu.difficulty.hard"></div>
				</div>
				<div class="btn" id="startBtn" data-lang="menu.start"></div>
				<div class="lang" id="langSwitch"></div>
			</div>

			<div id="endScreen">
				<h1 id="endTitle"></h1>
				<div class="btn" id="restartBtn" data-lang="end.restart"></div>
			</div>

			<div id="pauseScreen">
				<div class="dialog">
					<h2 id="pauseTitle" data-lang="pause.title"></h2>
					<div class="actions">
						<div class="btn" id="resumeBtn" data-lang="pause.resume"></div>
						<div class="btn" id="endMissionBtn" data-lang="pause.endMission"></div>
					</div>
				</div>
			</div>
		</div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
