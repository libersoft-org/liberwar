<!doctype html>
<html lang="en">
	<head>
		<!-- Ubuntu font from Google Fonts -->
		<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet" />
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<title></title>
		<style>
			:root {
				--hud-bg: #0c120c;
				--hud-panel: #16221a;
				--hud-border: #2f4a36;
				--accent: #6cff7a;
				--accent-dim: #2c7a36;
				--danger: #ff5a4d;
				--text: #cfe9d2;
			}
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: #000;
				color: var(--text);
				font-family: 'Ubuntu', sans-serif;
				user-select: none;
				-webkit-user-select: none;
			}
			#app {
				width: 100vw;
				height: 100vh;
				position: relative;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}
			canvas#game {
				display: block;
				cursor: crosshair;
				image-rendering: pixelated;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<canvas id="game"></canvas>
		</div>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
